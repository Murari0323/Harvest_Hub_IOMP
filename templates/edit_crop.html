{% extends "base.html" %}
{% block title %}Edit Crop — HarvestHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-4">
                    <i class="bi bi-pencil text-primary"></i> Edit Crop
                </h3>

                <form method="POST" action="{{ url_for('edit_crop', crop_id=crop.crop_id) }}" id="editCropForm">
                    <div class="mb-3">
                        <label for="crop_name" class="form-label">Crop Name *</label>
                        <input type="text" class="form-control" id="crop_name" name="crop_name"
                               value="{{ crop.crop_name }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity (kg) *</label>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   id="quantity" name="quantity" value="{{ crop.quantity }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price (₹ per kg) *</label>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   id="price" name="price" value="{{ crop.price }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category">
                                {% for cat in ['General','Cereals','Pulses','Vegetables','Fruits','Cash Crops','Spices'] %}
                                <option value="{{ cat }}" {{ 'selected' if crop.category == cat }}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="season" class="form-label">Season</label>
                            <select class="form-select" id="season" name="season">
                                <option value="">Select...</option>
                                {% for s in ['Kharif','Rabi','Zaid'] %}
                                <option value="{{ s }}" {{ 'selected' if crop.season == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3">{{ crop.description or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="image_url" class="form-label">Image URL</label>
                        <input type="url" class="form-control" id="image_url" name="image_url"
                               value="{{ crop.image_url or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="available" {{ 'selected' if crop.status == 'available' }}>Available</option>
                            <option value="sold_out" {{ 'selected' if crop.status == 'sold_out' }}>Sold Out</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                        <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
