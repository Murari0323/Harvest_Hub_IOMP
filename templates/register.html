{% extends "base.html" %}
{% block title %}Register — HarvestHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="card-body p-4 p-md-5">
            <h3 class="text-center mb-4">
                <i class="bi bi-person-plus"></i>
                Create Account
            </h3>

            <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="you@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Choose a strong password" minlength="6" required>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">I am a</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="" disabled selected>Select role…</option>
                        <option value="farmer">🌾 Farmer</option>
                        <option value="buyer">🛒 Buyer</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Location <small class="text-muted">(optional)</small></label>
                    <input type="text" class="form-control" id="location" name="location"
                           placeholder="City or village name">
                </div>

                <button type="submit" class="btn btn-success w-100 py-2">
                    <i class="bi bi-check-circle"></i> Register
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="{{ url_for('login') }}" class="fw-bold" style="color: var(--hh-green-light);">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
