{% extends "base.html" %}
{% block title %}Add Crop — HarvestHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6 fade-in">
        <div class="card glass-card border-0">
            <div class="card-body p-4">
                <h3 class="mb-4" style="font-family:'Outfit',sans-serif;">
                    <i class="bi bi-plus-circle" style="color: var(--hh-green-light);"></i> Add New Crop
                </h3>

                <form method="POST" action="{{ url_for('add_crop') }}" id="addCropForm">
                    <div class="mb-3">
                        <label for="crop_name" class="form-label">Crop Name *</label>
                        <input type="text" class="form-control" id="crop_name" name="crop_name"
                               placeholder="e.g. Rice, Wheat" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity (kg) *</label>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   id="quantity" name="quantity" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price (₹ per kg) *</label>
                            <input type="number" step="0.01" min="0" class="form-control"
                                   id="price" name="price" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category">
                                <option value="General">General</option>
                                <option value="Cereals">Cereals</option>
                                <option value="Pulses">Pulses</option>
                                <option value="Vegetables">Vegetables</option>
                                <option value="Fruits">Fruits</option>
                                <option value="Cash Crops">Cash Crops</option>
                                <option value="Spices">Spices</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="season" class="form-label">Season</label>
                            <select class="form-select" id="season" name="season">
                                <option value="">Select...</option>
                                <option value="Kharif">Kharif (Monsoon)</option>
                                <option value="Rabi">Rabi (Winter)</option>
                                <option value="Zaid">Zaid (Summer)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3" placeholder="Describe your crop (optional)"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="image_url" class="form-label">Image URL <small class="text-muted">(optional)</small></label>
                        <input type="url" class="form-control" id="image_url" name="image_url"
                               placeholder="https://...">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-check-circle"></i> Add Crop
                        </button>
                        <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
